# docker-compose.yml

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://pharma:pharma@db:5432/pharmabrain
      - DEBUG=true
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=pharma
      - POSTGRES_PASSWORD=pharma
      - POSTGRES_DB=pharmabrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma -d pharmabrain"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: